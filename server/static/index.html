<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fastify + Typescript App</title>
    <style>
      body {
        font-family: Georgia, "Times New Roman", Times, serif;
      }
    </style>
  </head>
  <body>
    <h1>Welcome to Redwind Fastify Backend</h1>
    <div id="app"></div>

    <script>
      let html = "";
      async function initApp() {
        document.getElementById("app").innerHTML = html;
      }

      initApp();
    </script>
  </body>
</html>
